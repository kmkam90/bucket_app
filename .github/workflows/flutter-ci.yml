name: Flutter CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  analyze-test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flutter-version: [ 'stable' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No tests dir, skipping flutter test"
          fi

      - name: Build APK (release)
        run: flutter build apk --release
